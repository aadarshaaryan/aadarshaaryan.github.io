{% extends "base/base.html" %}

{% block title %}Initialize Event Stream | Afflux Admin{% endblock %}

{% block head %}
<style>
    .admin-wrapper {
        max-width: 750px;
        margin: 50px auto;
        padding: 0 20px;
        font-family: monospace;
    }

    .admin-card {
        background: #050505;
        border: 1px solid #111111;
        border-radius: 8px;
        padding: 35px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
    }

    .admin-card h2 {
        color: #38BDF8;
        font-size: 1.4rem;
        margin: 0 0 24px 0;
        letter-spacing: 0.05em;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .full-width {
        grid-column: span 2;
    }

    .form-node {
        display: flex;
        flex-direction: column;
        margin-bottom: 18px;
    }

    .form-node label {
        font-size: 0.8rem;
        color: #8c949e;
        margin-bottom: 6px;
        text-transform: uppercase;
    }

    .form-node input,
    .form-node textarea,
    .form-node select {
        background: #0b0f14;
        border: 1px solid #1a1a1a;
        border-radius: 4px;
        padding: 10px 14px;
        color: #ffffff;
        font-family: monospace;
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.15s ease;
    }

    .form-node input:focus,
    .form-node textarea:focus,
    .form-node select:focus {
        border-color: #38BDF8;
    }

    .form-node textarea {
        resize: vertical;
        min-height: 80px;
    }

    .commit-stream-btn {
        background: #38BDF8;
        color: #000000;
        border: none;
        font-weight: bold;
        padding: 14px;
        border-radius: 4px;
        font-size: 0.95rem;
        font-family: monospace;
        cursor: pointer;
        width: 100%;
        margin-top: 15px;
        transition: opacity 0.15s ease;
    }

    .commit-stream-btn:hover {
        opacity: 0.9;
    }
</style>
{% endblock %}

{% block content %}
<div class="admin-wrapper">

    <div class="admin-card">
        <h2>// INITIALIZE_EVENT_STREAM</h2>

        <form action="{{ url_for('admin.post_event') }}" method="POST">
            <div class="form-grid">

                <div class="form-node full-width">
                    <label for="title">Event Title</label>
                    <input type="text" id="title" name="title" required placeholder="e.g., Afflux Web Hackathon 2026">
                </div>

                <div class="form-node full-width">
                    <label for="short_description">Short Description Summary</label>
                    <textarea id="short_description" name="short_description" required
                        placeholder="Provide a brief introductory description of the event guidelines..."></textarea>
                </div>

                <div class="form-node">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="HACKATHON">Hackathon</option>
                        <option value="QUIZ">Quiz</option>
                        <option value="WEBINAR">Webinar</option>
                        <option value="SCHOLARSHIP">Scholarship</option>
                        <option value="CULTURAL">Cultural</option>
                        <option value="COMPETETION">Competition</option>
                    </select>
                </div>

                <div class="form-node">
                    <label for="mode">Mode</label>
                    <select id="mode" name="mode" required>
                        <option value="online">Online</option>
                        <option value="offline">Offline</option>
                        <option value="hybrid">Hybrid</option>
                    </select>
                </div>

                <div class="form-node full-width">
                    <label for="hosted_by">Hosted By</label>
                    <input type="text" id="hosted_by" name="hosted_by" value="Afflux" placeholder="Afflux">
                </div>

                <div class="form-node">
                    <label for="registration_start">Registration Window Opens</label>
                    <input type="datetime-local" id="registration_start" name="registration_start">
                </div>

                <div class="form-node">
                    <label for="registration_deadline">Registration Deadline (Execution Starts)</label>
                    <input type="datetime-local" id="registration_deadline" name="registration_deadline" required>
                </div>

                <div class="form-node">
                    <label for="event_start_date">Event Track Live Date</label>
                    <input type="datetime-local" id="event_start_date" name="event_start_date">
                </div>

                <div class="form-node">
                    <label for="submission_deadline">Final Submissions Window Closes</label>
                    <input type="datetime-local" id="submission_deadline" name="submission_deadline">
                </div>

                <div class="form-node full-width">
                    <label for="registration_url">External Signup Endpoint URL</label>
                    <input type="url" id="registration_url" name="registration_url"
                        placeholder="https://example.com/details-link">
                </div>

                <div class="form-node full-width">
                    <label for="submission_url">Google Form Submission URL</label>
                    <input type="url" id="submission_url" name="submission_url"
                        placeholder="https://docs.google.com/forms/...">
                </div>

            </div>

            <button type="submit" class="commit-stream-btn">> DEPLOY_EVENT_STREAM</button>
        </form>

    </div>

</div>
{% endblock %}
