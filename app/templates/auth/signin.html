<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/notify.css') }}">
</head>

<body>
    <div class="msg_wrapper">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for msg in messages %}
        <div id="notify" class="notify">
            <p>{{ msg }}</p>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}
    </div>
    
    <div class="form-container">
        <h2>Sign in</h2>
        <form action="/login" method="POST">
            <input type="text" id="gmail" name="gmail" placeholder="yournam@gmail.com" required>

            <input type="password" id="password" name="password" placeholder="password" required>

            <button type="submit">Login</button>
        </form>
        <p class="bottom-line">Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a></p>

        <script src="{{ url_for('static', filename='js/notify.js') }}"></script>
    </div>
</body>

</html>
