<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Afflux</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <a href="#" class="auth-brand">Afflux</a>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a></p>
            </div>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <ul class="flash-messages">
                {% for message in messages %}
                <li class="flash-item flash-item-signin">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('auth.signin') }}" method="POST">
                <div class="form-group">
                    <label class="form-label" for="gmail">Google Email</label>
                    <input class="input-field" type="email" id="gmail" name="gmail" placeholder="username@gmail.com"
                        required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-relative-wrapper">
                        <input class="input-field password-input-pad" type="password" id="password" name="password"
                            placeholder="••••••••" required>
                        <button type="button" id="eye_cont" class="password-toggle-btn"
                            aria-label="Toggle password visibility">
                            <i id="eye" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>

</html>
