<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Security Token — Afflux</title>
    <link class="styling" rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <span class="auth-brand">Afflux</span>
                <h1 class="auth-title">Security Verification</h1>
                <p class="auth-subtitle">Enter the 6-digit verification pin sent to your dashboard profile identity
                    inbox.</p>
            </div>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <ul class="flash-messages">
                {% for message in messages %}
                <li class="flash-item flash-item-otp">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('auth.verify_otp') }}" method="POST">
                <div class="form-group">
                    <label class="form-label" style="text-align: center;" for="otp">One-Time Passcode</label>
                    <input class="input-field otp-input-center" type="text" id="otp" name="otp" maxlength="6"
                        placeholder="000000" autocomplete="off" inputmode="numeric" required>
                </div>

                <button type="submit" class="btn-submit">Verify Account Identity</button>
            </form>
        </div>
    </div>
</body>

</html>
